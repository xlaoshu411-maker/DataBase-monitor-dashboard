<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服务器性能监控 · 数据大屏</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0a0e1a;
  color: #e0e6f0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 动态粒子背景 */
#particles-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0;
  pointer-events: none;
}

/* 背景光晕 */
.bg-glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.glow-1 { width: 600px; height: 600px; top: -200px; left: -100px; background: radial-gradient(circle, rgba(99,102,241,.25), transparent); }
.glow-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; background: radial-gradient(circle, rgba(139,92,246,.2), transparent); }
.glow-3 { width: 400px; height: 400px; top: 40%; left: 50%; background: radial-gradient(circle, rgba(59,130,246,.15), transparent); }

/* 主容器 */
.container {
  position: relative;
  z-index: 1;
  max-width: 1600px;
  margin: 0 auto;
  padding: 24px 32px 48px;
}

/* 顶栏 */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  padding: 20px 32px;
  background: rgba(255,255,255,.04);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 20px;
}
.header-left h1 {
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, #818cf8, #c084fc, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-left p { font-size: 13px; color: rgba(255,255,255,.45); margin-top: 4px; }
.header-right {
  display: flex;
  gap: 24px;
  align-items: center;
}
.header-stat {
  text-align: center;
  padding: 8px 20px;
  background: rgba(255,255,255,.04);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.06);
}
.header-stat .num { font-size: 22px; font-weight: 700; color: #a5b4fc; }
.header-stat .label { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 2px; }

/* 毛玻璃卡片 */
.glass {
  background: rgba(255,255,255,.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 16px;
  padding: 20px;
  transition: all .3s ease;
}
.glass:hover { border-color: rgba(255,255,255,.12); box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.glass .title {
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,.7);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.glass .title .dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: linear-gradient(135deg, #818cf8, #c084fc);
}

/* 网格布局 */
.row { display: flex; gap: 20px; margin-bottom: 20px; }
.col { flex: 1; min-width: 0; }
.col-2 { flex: 2; }
.chart-box { height: 280px; }

/* KPI 行 */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
.kpi-card {
  padding: 20px 24px;
  position: relative;
  overflow: hidden;
}
.kpi-card .kpi-icon {
  font-size: 28px;
  margin-bottom: 8px;
}
.kpi-card .kpi-num {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #a5b4fc, #e0e7ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.kpi-card .kpi-label { font-size: 12px; color: rgba(255,255,255,.45); }
.kpi-card .kpi-bar {
  position: absolute;
  top: 0; left: 0; height: 3px;
  border-radius: 0 0 4px 0;
}
.kpi-card .kpi-bar.purple { width: 100%; background: linear-gradient(90deg, #818cf8, #c084fc); }
.kpi-card .kpi-bar.blue { width: 100%; background: linear-gradient(90deg, #60a5fa, #818cf8); }
.kpi-card .kpi-bar.green { width: 100%; background: linear-gradient(90deg, #34d399, #60a5fa); }
.kpi-card .kpi-bar.orange { width: 100%; background: linear-gradient(90deg, #fbbf24, #f472b6); }

/* 主机表格 */
.host-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.host-table th { text-align: left; padding: 8px 10px; color: rgba(255,255,255,.35); font-weight: 500; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 11px; }
.host-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,.03); color: rgba(255,255,255,.7); }
.host-table tr:hover td { background: rgba(255,255,255,.03); }
.host-tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  background: rgba(99,102,241,.15);
  color: #a5b4fc;
}
.cpu-bar {
  display: inline-block;
  height: 4px;
  border-radius: 4px;
  background: linear-gradient(90deg, #818cf8, #c084fc);
  vertical-align: middle;
  margin-right: 6px;
}

/* 指标字典表格（两列） */
.dict-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
.dict-card .sub-title {
  font-size: 12px;
  color: rgba(255,255,255,.4);
  margin-bottom: 12px;
}

/* 响应式 */
@media (max-width: 1024px) {
  .row { flex-direction: column; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .dict-grid { grid-template-columns: 1fr; }
}

/* 时间戳动画 */
.ts-arrow { display: inline-block; animation: pulse-arrow 2s ease-in-out infinite; color: #818cf8; }
@keyframes pulse-arrow { 0%,100%{opacity:1;transform:translateX(0)} 50%{opacity:.4;transform:translateX(6px)} }

/* 状态灯 */
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.green { background: #34d399; box-shadow: 0 0 8px rgba(52,211,153,.4); }
.status-dot.yellow { background: #fbbf24; box-shadow: 0 0 8px rgba(251,191,36,.4); }
</style>
</head>
<body>

<!-- 背景 -->
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>
<div class="bg-glow glow-3"></div>
<canvas id="particles-canvas"></canvas>

<div class="container">

  <!-- 顶栏 -->
  <div class="header">
    <div class="header-left">
      <h1>⚡ 服务器性能监控 · 数据大屏</h1>
      <p>HismartLab · 20 台物理服务器 · TSAR 监控数据集</p>
    </div>
    <div class="header-right">
      <div class="header-stat">
        <div class="num" id="stat-hosts">—</div>
        <div class="label">服务器</div>
      </div>
      <div class="header-stat">
        <div class="num" id="stat-metrics">—</div>
        <div class="label">监控指标</div>
      </div>
      <div class="header-stat">
        <div class="num" id="stat-rows">—</div>
        <div class="label">数据行数</div>
      </div>
      <div class="header-stat">
        <div class="num" id="stat-days">—</div>
        <div class="label">采集天数</div>
      </div>
    </div>
  </div>

  <!-- KPI 行 -->
  <div class="kpi-row">
    <div class="glass kpi-card">
      <div class="kpi-bar purple"></div>
      <div class="kpi-icon">🖥️</div>
      <div class="kpi-num">20</div>
      <div class="kpi-label">受管服务器</div>
    </div>
    <div class="glass kpi-card">
      <div class="kpi-bar blue"></div>
      <div class="kpi-icon">📊</div>
      <div class="kpi-num">55</div>
      <div class="kpi-label">监控指标</div>
    </div>
    <div class="glass kpi-card">
      <div class="kpi-bar green"></div>
      <div class="kpi-icon">💾</div>
      <div class="kpi-num">79,200</div>
      <div class="kpi-label">总采样行数</div>
    </div>
    <div class="glass kpi-card">
      <div class="kpi-bar orange"></div>
      <div class="kpi-icon">📅</div>
      <div class="kpi-num">42</div>
      <div class="kpi-label">最长采集天数</div>
    </div>
  </div>

  <!-- 第一行：ER 图 + 时间戳 -->
  <div class="row">
    <div class="col-2 glass">
      <div class="title"><span class="dot"></span> 实体关系图 (ER)</div>
      <div id="chart-er" class="chart-box" style="height:320px"></div>
    </div>
    <div class="col glass">
      <div class="title"><span class="dot"></span> 时间戳解析</div>
      <div style="padding:8px 4px">
        <div style="background:rgba(255,255,255,.03);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid rgba(255,255,255,.04)">
          <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:6px">原始存储 (BIGINT)</div>
          <div style="font-family:'Cascadia Code','JetBrains Mono',monospace;font-size:15px;color:#a5b4fc;font-weight:600">1782835200000</div>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 0">
          <span class="ts-arrow">→</span> <span style="font-size:12px;color:rgba(255,255,255,.4)">÷ 1000</span> <span class="ts-arrow">→</span>
        </div>
        <div style="background:rgba(255,255,255,.03);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid rgba(255,255,255,.04)">
          <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:6px">人类可读</div>
          <div style="font-family:'Cascadia Code','JetBrains Mono',monospace;font-size:15px;color:#34d399;font-weight:600">2026-07-01 00:00:00</div>
        </div>
        <div id="chart-timeline" style="height:80px;margin-top:4px"></div>
      </div>
    </div>
  </div>

  <!-- 第二行：CPU + Memory -->
  <div class="row">
    <div class="col-2 glass">
      <div class="title"><span class="dot"></span> CPU 使用率趋势 · host001</div>
      <div id="chart-cpu" class="chart-box"></div>
    </div>
    <div class="col glass">
      <div class="title"><span class="dot"></span> 各主机 CPU 峰值排行</div>
      <div id="chart-cpu-rank" class="chart-box"></div>
    </div>
  </div>

  <!-- 第三行：内存 + 分布 -->
  <div class="row">
    <div class="col glass">
      <div class="title"><span class="dot"></span> 服务器型号分布</div>
      <div id="chart-model" class="chart-box"></div>
    </div>
    <div class="col glass">
      <div class="title"><span class="dot"></span> 机房分布</div>
      <div id="chart-loc" class="chart-box"></div>
    </div>
    <div class="col glass">
      <div class="title"><span class="dot"></span> 磁盘使用率 TOP</div>
      <div id="chart-disk" class="chart-box"></div>
    </div>
  </div>

  <!-- 第四行：主机列表 -->
  <div class="glass" style="padding:20px 24px">
    <div class="title"><span class="dot"></span> 服务器清单</div>
    <div style="max-height:300px;overflow-y:auto">
      <table class="host-table" id="host-table">
        <thead>
          <tr>
            <th>主机</th>
            <th>主机名</th>
            <th>负责人</th>
            <th>型号</th>
            <th>机房</th>
            <th style="text-align:right">CPU 峰值</th>
          </tr>
        </thead>
        <tbody id="host-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const DATA_URL = 'dashboard_data.json';

fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    // 更新顶栏
    document.getElementById('stat-hosts').textContent = data.hosts_count;
    document.getElementById('stat-metrics').textContent = data.mods.length;
    document.getElementById('stat-rows').textContent = (data.disk_rows + data.pref_rows).toLocaleString();
    document.getElementById('stat-days').textContent = (new Date('2026-08-11') - new Date('2026-07-01')) / 86400000;

    // 主机表格
    const tbody = document.getElementById('host-tbody');
    data.hosts.forEach(h => {
      const cpu = data.cpu_latest.find(c => c.hostid === h.id);
      const pct = cpu ? cpu.val : 0;
      const barW = Math.min(pct * 1.2, 100);
      const color = pct > 70 ? '#f87171' : pct > 40 ? '#fbbf24' : '#34d399';
      const dot = pct > 70 ? 'yellow' : 'green';
      tbody.innerHTML += `<tr>
        <td><span class="status-dot ${dot}"></span>${h.id}</td>
        <td>${h.name}</td>
        <td>${h.owner}</td>
        <td><span class="host-tag">${h.model}</span></td>
        <td>${h.loc}</td>
        <td style="text-align:right"><div class="cpu-bar" style="width:${barW}px;background:${color}"></div>${pct.toFixed(1)}%</td>
      </tr>`;
    });

    // --- ER 图 (Sankey) ---
    const erChart = echarts.init(document.getElementById('chart-er'));
    erChart.setOption({
      backgroundColor: 'transparent',
      series: [{
        type: 'sankey',
        layout: 'none',
        emphasis: { focus: 'adjacency' },
        nodeAlign: 'left',
        nodeWidth: 14,
        nodeGap: 14,
        lineStyle: { color: 'gradient', opacity: 0.3 },
        data: [
          { name: 'host_detail\n(20行)', itemStyle: { color: '#818cf8' } },
          { name: 'mod_detail\n(55行)', itemStyle: { color: '#c084fc' } },
          { name: 'disk_tsar\n(12,000行)', itemStyle: { color: '#60a5fa' } },
          { name: 'pref_tsar\n(67,200行)', itemStyle: { color: '#34d399' } },
        ],
        links: [
          { source: 'host_detail\n(20行)', target: 'disk_tsar\n(12,000行)', value: 12000 },
          { source: 'host_detail\n(20行)', target: 'pref_tsar\n(67,200行)', value: 67200 },
          { source: 'mod_detail\n(55行)', target: 'disk_tsar\n(12,000行)', value: 12000 },
          { source: 'mod_detail\n(55行)', target: 'pref_tsar\n(67,200行)', value: 67200 },
        ],
        label: { color: 'rgba(255,255,255,.7)', fontSize: 11 },
      }]
    });

    // --- 时间轴 ---
    const tlChart = echarts.init(document.getElementById('chart-timeline'));
    tlChart.setOption({
      backgroundColor: 'transparent',
      grid: { top: 5, bottom: 5, left: 5, right: 5 },
      xAxis: { type: 'time', show: false, min: '2026-07-01', max: '2026-08-11' },
      yAxis: { show: false },
      series: [{
        type: 'line',
        data: [
          ['2026-07-01', 1], ['2026-07-01T00:05:00', 2],
          ['2026-07-02', 1], ['2026-07-07', 3],
          ['2026-07-08', 1], ['2026-08-11', 4],
        ],
        smooth: true,
        lineStyle: { color: '#818cf8', width: 2, opacity: 0.6 },
        areaStyle: { color: 'rgba(129,140,248,.15)' },
        showSymbol: false,
      }],
    });

    // --- CPU 趋势 ---
    const cpuChart = echarts.init(document.getElementById('chart-cpu'));
    const dates = data.cpu_series.map(d => d.hour.slice(5));
    cpuChart.setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'axis', backgroundColor: 'rgba(15,23,42,.9)', borderColor: 'rgba(255,255,255,.1)' },
      legend: { data: ['user', 'sys', 'wait'], textStyle: { color: 'rgba(255,255,255,.6)', fontSize: 11 }, bottom: 0 },
      grid: { top: 10, bottom: 30, left: 40, right: 10 },
      xAxis: { type: 'category', data: dates, axisLabel: { color: 'rgba(255,255,255,.3)', fontSize: 9, interval: 20 }, axisLine: { show: false }, splitLine: { show: false } },
      yAxis: { type: 'value', name: '%', nameTextStyle: { color: 'rgba(255,255,255,.3)' }, axisLabel: { color: 'rgba(255,255,255,.3)' }, splitLine: { color: 'rgba(255,255,255,.04)' } },
      series: [
        { name: 'user', type: 'line', smooth: true, data: data.cpu_series.map(d => d.user), lineStyle: { width: 1.5 }, areaStyle: { opacity: .08 }, symbol: 'none' },
        { name: 'sys', type: 'line', smooth: true, data: data.cpu_series.map(d => d.sys), lineStyle: { width: 1.5 }, areaStyle: { opacity: .08 }, symbol: 'none' },
        { name: 'wait', type: 'line', smooth: true, data: data.cpu_series.map(d => d.wait), lineStyle: { width: 1.5 }, areaStyle: { opacity: .08 }, symbol: 'none' },
      ],
      color: ['#818cf8', '#60a5fa', '#fbbf24'],
    });

    // --- CPU 排行 ---
    const rankChart = echarts.init(document.getElementById('chart-cpu-rank'));
    const top20 = data.cpu_latest.slice(0, 20);
    rankChart.setOption({
      backgroundColor: 'transparent',
      grid: { top: 10, bottom: 20, left: 10, right: 60 },
      xAxis: { type: 'value', axisLabel: { color: 'rgba(255,255,255,.3)', fontSize: 9 }, splitLine: { color: 'rgba(255,255,255,.04)' } },
      yAxis: { type: 'category', data: top20.map(d => d.hostid).reverse(), axisLabel: { color: 'rgba(255,255,255,.6)', fontSize: 10 } },
      series: [{
        type: 'bar',
        data: top20.map(d => ({ value: d.val, itemStyle: { color: d.val > 60 ? '#f87171' : d.val > 35 ? '#fbbf24' : '#34d399' } })).reverse(),
        barWidth: 10,
        label: { show: true, position: 'right', color: 'rgba(255,255,255,.5)', fontSize: 10, formatter: p => p.value.toFixed(1) + '%' },
      }],
    });

    // --- 型号分布 ---
    const mdlChart = echarts.init(document.getElementById('chart-model'));
    mdlChart.setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'item', backgroundColor: 'rgba(15,23,42,.9)', borderColor: 'rgba(255,255,255,.1)' },
      series: [{
        type: 'pie',
        radius: ['45%', '70%'],
        center: ['50%', '50%'],
        label: { color: 'rgba(255,255,255,.6)', fontSize: 11, formatter: '{b}\n{c}台' },
        data: data.host_models.map((m, i) => ({
          name: m.name, value: m.count,
          itemStyle: { color: ['#818cf8','#60a5fa','#34d399','#fbbf24','#f472b6','#c084fc'][i] },
        })),
      }],
    });

    // --- 机房分布 ---
    const locChart = echarts.init(document.getElementById('chart-loc'));
    const locColors = ['#818cf8','#60a5fa','#34d399','#fbbf24','#f472b6'];
    locChart.setOption({
      backgroundColor: 'transparent',
      grid: { top: 10, bottom: 20, left: 40, right: 10 },
      xAxis: { type: 'category', data: data.loc_dist.map(d => d.name), axisLabel: { color: 'rgba(255,255,255,.5)', fontSize: 11 }, axisLine: { show: false } },
      yAxis: { type: 'value', axisLabel: { color: 'rgba(255,255,255,.3)' }, splitLine: { color: 'rgba(255,255,255,.04)' } },
      series: [{
        type: 'bar',
        data: data.loc_dist.map((d,i) => ({ value: d.count, itemStyle: { color: locColors[i], borderRadius: [4,4,0,0] } })),
        barWidth: 32,
        label: { show: true, position: 'top', color: 'rgba(255,255,255,.6)', fontSize: 13, fontWeight: 'bold' },
      }],
    });

    // --- 磁盘使用率 ---
    const diskChart = echarts.init(document.getElementById('chart-disk'));
    const du = data.disk_util.slice(0, 12);
    diskChart.setOption({
      backgroundColor: 'transparent',
      grid: { top: 10, bottom: 20, left: 10, right: 50 },
      xAxis: { type: 'value', max: 100, axisLabel: { color: 'rgba(255,255,255,.3)', fontSize: 9, formatter: '{value}%' }, splitLine: { color: 'rgba(255,255,255,.04)' } },
      yAxis: { type: 'category', data: du.map(d => d.mod).reverse(), axisLabel: { color: 'rgba(255,255,255,.5)', fontSize: 9 } },
      series: [{
        type: 'bar',
        data: du.map(d => ({ value: d.val, itemStyle: { color: d.val > 80 ? '#f87171' : d.val > 50 ? '#fbbf24' : '#34d399' } })).reverse(),
        barWidth: 10,
        label: { show: true, position: 'right', color: 'rgba(255,255,255,.4)', fontSize: 9, formatter: p => p.value.toFixed(1) + '%' },
      }],
    });

    // Resize
    window.addEventListener('resize', () => {
      [erChart, tlChart, cpuChart, rankChart, mdlChart, locChart, diskChart].forEach(c => c.resize());
    });
  });

// 粒子背景
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 2 + 0.5,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(129,140,248,.25)';
      ctx.fill();
    });
    // connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 160) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(129,140,248,${0.08 * (1 - dist / 160)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
